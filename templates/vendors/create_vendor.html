<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reuse the exact same CSS from Register form above - paste body/container/input/button styles here */
        body { /* ... same gradient background ... */ }
        .container { /* ... same glassmorphism ... */ }
        /* ... all styles from Register form ... */
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Store</h2>
        <form method="POST" id="createStoreForm">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Storee</button>
        </form>
    </div>
    
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('createStoreForm');
        const btn = form.querySelector('button[type="submit"]');
        form.addEventListener('submit', function() {
            btn.innerHTML = 'Creating...';
            btn.disabled = true;
        });
    });
    </script>
</body>
</html>
