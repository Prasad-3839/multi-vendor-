{% extends "vendors/vendor_base.html" %}

{% block vendor_content %}
<div class="main">
  <!-- WELCOME -->
  <div class="card" style="background: white;">
    <h2 style="color: #1e293b; margin-bottom: 15px;">Welcome, {{ vendor.store_name }}!</h2>
    <p style="font-size: 18px; color: #374151;">
      <strong>Status:</strong>
      {% if vendor.is_approved %}
        <span class="approved">Approved ✅</span>
      {% else %}
        <span class="pending">Pending Approval ⏳</span>
      {% endif %}
    </p>
  </div>
  
  <!-- STATS (light cards) -->
  <div class="card" style="background: white;">
    <div class="grid">
      <div class="stat-card">
        <h3 style="color: #3b82f6;">{{ vendor.product_set.count }}</h3>
        <p style="color: #6b7280;">Total Products</p>
      </div>
      <div class="stat-card">
        <h3 style="color: #10b981;">₹0</h3>
        <p style="color: #6b7280;">Total Revenue</p>
      </div>
      <div class="stat-card">
        <h3 style="color: #f59e0b;">0</h3>
        <p style="color: #6b7280;">Total Orders</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
