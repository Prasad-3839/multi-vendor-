<!doctype html>
<html lang="en">
  <head>
    <title>Store Under Review</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(
          135deg,
          #ff9a9e 0%,
          #fecfef 50%,
          #fecfef 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .approval-card {
        width: 100%;
        max-width: 450px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 48px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        text-align: center;
      }
      h2 {
        color: #fff;
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 20px;
        letter-spacing: -0.5px;
      }
      p {
        color: rgba(255, 255, 255, 0.9);
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .icon {
        font-size: 64px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 20px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.05);
        }
      }
      @media (max-width: 480px) {
        .approval-card {
          padding: 40px 24px;
          margin: 10px;
        }
        p {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="approval-card">
      <div class="icon">⏳</div>
      <h2>Waiting for Approval</h2>
      <p>
        Your store is under review by admin. We'll notify you via email once
        approved.
      </p>
      <a
        href="/dashboard/"
        style="
          display: inline-block;
          padding: 12px 28px;
          background: linear-gradient(135deg, #43e97b, #38f9d7);
          color: #fff;
          text-decoration: none;
          border-radius: 12px;
          font-weight: 600;
        "
        >Dashboard</a
      >
    </div>
  </body>
</html>
