<!DOCTYPE html>
<html>
<head>
  <title>Become Vendor</title>
  //fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Copy the body, .card, form styles from vendor_base.html above */
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .container { max-width: 400px; width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 style="text-align: center; margin-bottom: 30px;">🚀 Become a Vendor</h2>
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          abel>Store Name</label>
          {{ form.store_name }}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register Now</button>
      </form>
    </div>
  </div>
</body>
</html>
