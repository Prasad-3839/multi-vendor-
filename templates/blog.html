{% extends "base.html" %}

{% block content %}

<section class="text-center inner-page-header">
    <h2>Blogs</static/h2>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb justify-content-center mb-0">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Blogs</li>
      </ol>
    </nav>
  </section>

    <section class="text-center">
      <div class="container">
      <div class="row">
        {% for blog in blogs %}

        <div class="col-lg-4 col-md-6 col-12 mb-lg-4 mb-md-4 mb-3">
          <div class="card border-0 card-custom">
            <img src="{{ blog.image.url }}" alt="Blog Image" class="img-fluid card-img-top" alt="...">
            <div class="card-body">
              <div class="sehdule d-flex align-items-center">
                <i class="icofont-ui-calendar"></i>
                <h6 class="ms-2">{{ blog.created_at }}</h6>
              </div>
              <h5 class="card-title my-lg-3 my-md-3 my-2">{{ blog.title }}</h5>
              <a href="blog-details.html" class="btn btn-blue">Read Details</a>
            </div>
          </div>
        </div>

        {% endfor %}
      
      </div>
    </div>
  </section>


  {% endblock %}
