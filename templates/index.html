{% extends "base.html" %}

{% block content %}

<!-- Hero Banner -->

<div class="p-5 text-center bg-light rounded">

<h1>Welcome to MyMarket</h1>

<p>Buy from thousands of vendors.</p>

<a class="btn btn-warning btn-lg">Start Shopping</a>

</div>


<!-- Featured Products -->

<h3 class="mt-5 mb-3">Featured Products</h3>

<div class="row">

{% for product in products %}

<div class="col-md-3 mb-4">

<div class="card h-100">

<img src="{{ product.image.url }}" class="card-img-top">

<div class="card-body">

<h6>{{ product.name }}</h6>

<p>$ {{ product.price }}</p>

<a href="/product/{{product.id}}" class="btn btn-outline-primary btn-sm">View</a>

<button class="btn btn-warning btn-sm">Add to Cart</button>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
