{% extends "base.html" %}
{% block content %}

<div class="container mt-5 text-center">

    <div class="card shadow p-5">

        <!-- Success Icon -->
        <div class="mb-4">
            <div style="
                width:80px;
                height:80px;
                background:#28a745;
                border-radius:50%;
                display:flex;
                align-items:center;
                justify-content:center;
                margin:auto;
                font-size:40px;
                color:white;">
                ✓
            </div>
        </div>

        <h2 class="text-success">Payment Successful!</h2>
        <p class="text-muted mt-2">
            Your order has been placed successfully.
        </p>

        <hr>

        <p class="mb-4">
            Thank you for shopping with us ❤️
        </p>

        <!-- Buttons -->
        <div class="d-flex justify-content-center gap-3">

            <a href="/" class="btn btn-primary">
                Continue Shopping
            </a>

            <a href="{% url "history" %}" class="btn btn-outline-dark">
                View Orders
            </a>

        </div>

    </div>

</div>

{% endblock %}
